workflows:
  mac-build:
    name: Padloc macOS Build

    environment:
      node: 10.24.1
      xcode: latest

    scripts:
      - name: Show versions
        script: |
          node -v
          npm -v

      - name: Downgrade npm and install tools
        script: |
          npm install -g npm@6
          npm install -g gulp
          npm install -g bower
          npm install -g node-gyp@6.1.0

      - name: Configure node-gyp
        script: |
          npm config set node_gyp $(which node-gyp)

      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Install bower packages
        script: |
          cd app
          bower install --allow-root

      - name: Build Stylus
        script: |
          npx gulp stylus

      - name: Run ESLint
        script: |
          npx gulp eslint || true

      - name: Build macOS app
        script: |
          export ELECTRON_CACHE=$HOME/Library/Caches/electron
          npx gulp build --mac

      - name: Show dist contents
        script: |
          ls -R dist || true

    artifacts:
      - dist/**/*

    publishing:
      email:
        recipients:
          - problemsolver687@gmail.com
