name: Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    env:
      ELECTRON_CACHE: $RUNNER_TEMP/electron

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 10
        uses: actions/setup-node@v4
        with:
          node-version: "10.24.1"
          architecture: x64

      - name: Install npm 6
        run: |
          npm install -g npm@6
          node -v
          npm -v

      - name: Install global packages
        run: |
          npm install -g bower
          npm install -g node-gyp@6.1.0

      - name: Install project dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Install packaging tools
        run: |
          npm install --no-save \
            electron-packager@8.5.2 \
            electron-winstaller@2.7.0

      - name: Verify installed versions
        run: |
          node -e "console.log('electron-packager:', require('./node_modules/electron-packager/package.json').version)"
          node -e "console.log('electron-winstaller:', require('./node_modules/electron-winstaller/package.json').version)"

      - name: Install bower packages
        working-directory: app
        run: |
          bower install --allow-root

      - name: Build Stylus
        run: |
          npx gulp stylus

      - name: Run ESLint
        run: |
          npx gulp eslint || true

      - name: Build web application
        run: |
          node - <<'NODE'
          const { build } = require('./lib/build');
          build('dist/electron')
            .then(() => console.log("Build complete"))
            .catch(err => {
              console.error(err);
              process.exit(1);
            });
          NODE

      - name: Copy Electron files
        run: |
          cp electron/main.js dist/electron/
          cp electron/package.json dist/electron/

      - name: Debug electron-packager
        run: |
          ls node_modules/electron-packager
          node -e "console.log(require('./node_modules/electron-packager/package.json'))"

      - name: Package Electron app
        run: |
          node ./node_modules/electron-packager/cli.js \
            dist/electron \
            Padlock \
            --platform=win32 \
            --arch=x64 \
            --electron-version=1.4.5 \
            --overwrite \
            --icon=electron/icon.ico \
            --out=dist

      - name: Locate packaged app
        run: |
          APP=$(find dist -maxdepth 1 -type d -name "*win32-x64" | head -n1)

          echo "APP=$APP"

          echo "APP=$APP" >> $GITHUB_ENV

          ls "$APP"

      - name: Read package version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Squirrel installer
        run: |
          node - <<'NODE'
          const installer=require('electron-winstaller');

          installer.createWindowsInstaller({
            appDirectory: process.env.APP,
            outputDirectory: "dist/release",
            exe: "Padlock.exe",
            setupExe: "Padlock.Setup.${process.env.VERSION}.exe",
            loadingGif: undefined,
            noMsi: true,
            authors: "Akshit Gupta",
            title: "Padlock",
            description: "Padlock"
          })
          .then(()=>{
            console.log("Installer created");
          })
          .catch(err=>{
            console.error(err);
            process.exit(1);
          });
          NODE

      - name: Show output
        run: |
          find dist -type f

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            dist/release/*.exe
            dist/release/*.nupkg
            dist/release/RELEASES
