name: macOS Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      ELECTRON_CACHE: $RUNNER_TEMP/electron
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Rosetta 2 (for x86 Node compatibility)
        run: |
          sudo softwareupdate --install-rosetta --agree-to-license || true

      - name: Setup Node.js 10 (x64)
        uses: actions/setup-node@v4
        with:
          node-version: "10.24.1"
          cache: "npm"
          architecture: "x64"

      - name: Show versions
        run: |
          node -v
          npm -v
          xcodebuild -version || true

      - name: Downgrade npm and install global tools
        run: |
          npm install -g npm@6
          npm install -g gulp
          npm install -g bower
          npm install -g node-gyp@6.1.0

      - name: Configure node-gyp
        run: |
          npm config set node_gyp $(which node-gyp) || true

      - name: Clean install
        run: |
          rm -rf node_modules || true
          rm -f package-lock.json || true
          npm install --legacy-peer-deps

      - name: Install bower packages
        working-directory: app
        run: |
          bower install --allow-root

      - name: Build Stylus
        run: npx gulp stylus

      - name: Run ESLint (non-fatal)
        run: npx gulp eslint || true

      - name: Build mac app (try electron-builder; don't fail workflow)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ELECTRON_CACHE: ${{ env.ELECTRON_CACHE }}
        run: |
          set -o pipefail
          npx gulp build --mac 2>&1 | tee build-builder.log || true

      - name: Fallback - package with electron-packager if no artifact
        run: |
          set -e
          # detect existing mac artifact
          if find dist -type f \( -name "*.zip" -o -name "*.dmg" -o -name "*.app" \) | grep -q .; then
            echo "Artifact already exists, skipping fallback packaging."
            exit 0
          fi

          echo "No artifact found — running electron-packager fallback"
          npx electron-packager dist/electron Padlock --platform=darwin --arch=x64 --out=dist --overwrite --app-bundle-id=com.agtech.padlock --app-version=1.0.0 || true

          # Zip the .app if present
          APP=$(find dist -maxdepth 1 -type d -name "*Padlock*.app" | head -n1 || true)
          if [ -n "$APP" ]; then
            ZIP=dist/Padlock-mac-x64.zip
            ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"
            echo "Created $ZIP"
          fi

      - name: Show dist contents
        run: ls -R dist || true

      - name: Find mac artifact
        id: find_artifact
        run: |
          ART=$(find dist -type f \( -name "*.zip" -o -name "*.dmg" -o -name "*.tar.gz" \) | head -n1 || true)
          echo "artifact=$ART" >> $GITHUB_OUTPUT
          echo "Found artifact: $ART"

      - name: Set artifact name
        run: |
          # Use tag version if present (strip leading 'v'), otherwise package.json
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            V="${GITHUB_REF#refs/tags/}"
            V="${V#v}"
          else
            V=$(node -p "require('./package.json').version")
          fi
          echo "VERSION=$V" >> $GITHUB_ENV
          echo "ARTNAME=Padlock-$V-mac" >> $GITHUB_ENV

      - name: Prepare single mac zip artifact
        id: prepare_zip
        run: |
          set -e
          # prefer a packaged .app if present
          APP=$(find dist -type d -name "*.app" | head -n1 || true)
          OUT=dist/${ARTNAME}.zip
          if [ -n "$APP" ]; then
            APPDIR=$(dirname "$APP")
            if [ "$(basename "$APP")" != "Padlock.app" ]; then
              mv "$APP" "$APPDIR/Padlock.app" || true
              APP="$APPDIR/Padlock.app"
            fi
            echo "Creating zip from $APP -> $OUT"
            ditto -c -k --sequesterRsrc --keepParent "$APP" "$OUT"
          else
            echo "No .app found — zipping entire dist directory -> $OUT"
            if [ -d dist ]; then
              (cd dist && zip -r ../${ARTNAME}.zip .) || true
            else
              echo "dist folder missing"
              touch "$OUT"
            fi
          fi
          echo "artifact=$OUT" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          path: dist/mac-dist.zip

      # Release creation/upload removed — user will create release manually
