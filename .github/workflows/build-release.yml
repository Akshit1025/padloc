name: Build macOS Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-12 # ← Intel x64 runner; matches electron-v7.3.3-darwin-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "10"
          architecture: "x64"

      - name: Downgrade npm and patch node-gyp
        run: |
          npm install -g npm@6
          npm install -g node-gyp@6.1.0
          npm config set node_gyp $(which node-gyp)

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Bower
        run: npm install -g bower

      - name: Install bower packages
        working-directory: ./app
        run: bower install --allow-root

      # Cache electron binary so it survives across re-runs
      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: electron-7.3.3-darwin-x64

      - name: Build styles
        run: npx gulp stylus

      - name: Run eslint
        run: npx gulp eslint || true

      - name: Build macOS app
        env:
          ELECTRON_CACHE: ~/Library/Caches/electron # ← tells electron-builder exactly where to look
        run: npx gulp build --mac

      - name: Show dist files
        run: ls -R dist

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
