<link rel="import" href="../../padlock.html">
<link rel="import" href="../../../bower_components/polymer/polymer.html">
<link rel="import" href="../view/view.html">
<link rel="import" href="../dialog/dialog.html">
<link rel="import" href="../input/input.html">
<link rel="import" href="../toggle/toggle.html">

<dom-module id="padlock-settings-view">

    <link href="../view/view.css" rel="import" type="css">
    <link href="settings-view.css" rel="import" type="css">

    <template>
        <div class="section">
            <button on-click="_import">Import Data</button>
            <button on-click="_export">Export Data</button>
            <button on-click="_resetData">Reset Data</button>
            <button on-click="_changePassword">Change Master Password</button>
        </div>
        <div class="section">
            <button on-click="_cloudConnect" hidden$="{{ settings.sync_connected }}">Connect To Padlock Cloud</button>
            <button on-click="_cloudDisconnect" hidden$="{{ !settings.sync_connected }}">
                <div>Disconnect <span class="email">(<span>{{ settings.sync_email }}</span>)</span></div>
            </button>
            <button on-click="_resetRemoteData" hidden$="{{ !settings.sync_connected }}">Reset Remote Data</button>
            <padlock-toggle-button value="{{ settings.sync_auto }}" label="Auto Sync"
                hidden$="{{ !settings.sync_connected }}"></padlock-toggle-button>
        </div>
        <div class="section">
            <padlock-toggle-button value="{{ settings.obfuscate_fields }}"
                label="Hide Field Values"></padlock-toggle-button>
        </div>
        <div class="section">
            <button on-click="_openWebsite">Website</button>
            <button on-click="_sendMail">Support</button>
            <div class="info" on-click="_openHomepage">Developed and maintained by <strong>Akshit Gupta</strong></div>
        </div>

        <!-- PROGRESS INDICATOR -->
        <padlock-progress id="progress">Sending request...</padlock-progress>

    </template>

    <script src="settings-view.js"></script>

</dom-module>
